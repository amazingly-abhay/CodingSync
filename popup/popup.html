<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CodingSync</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- Not configured state -->
  <div id="state-setup" class="hidden">
    <div class="setup-hero">
      <img src="../icons/CodingSync-icon.png" width="40" alt="">
      <h1>CodingSync</h1>
      <p class="sub">Connect GitHub to start syncing your solutions automatically.</p>
      <button id="btn-setup" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        Connect GitHub
      </button>
    </div>
  </div>

  <!-- Configured state -->
  <div id="state-main" class="hidden">
    <header>
      <div class="header-left">
        <img src="../icons/CodingSync-icon.png" width="20" alt="">
        <span class="app-name">CodingSync</span>
      </div>
      <button id="btn-settings" class="icon-btn" title="Settings">⚙</button>
    </header>

    <div id="user-row" class="user-row">
      <img id="avatar" src="" width="24" alt="">
      <span id="username"></span>
      <span class="sep">·</span>
      <a id="repo-link" href="#" target="_blank" class="repo-link"></a>
    </div>

    <div class="stats-row">
      <div class="stat">
        <span id="total">0</span>
        <label>Synced</label>
      </div>
      <div class="stat">
        <span id="queue">0</span>
        <label>Queued</label>
      </div>
    </div>

    <div class="last-card">
      <p class="card-label">Last synced</p>
      <p id="last-title">—</p>
      <p id="last-time" class="sub small">—</p>
    </div>

    <footer>
      <button id="btn-retry" class="btn-secondary">↺ Retry queue</button>
    </footer>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
